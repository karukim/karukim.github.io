<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before - 음식 주문 앱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #333;
    }
    html, body { overflow: -moz-scrollbars-none; -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px; font-size: 12px; font-weight: 600; background: #fff;
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    }
    body { padding-top: 28px; }

    /* 문제1: 헤더가 너무 크고 공간 낭비 */
    .header {
      background: #FF3B30;
      color: #fff;
      padding: 28px 16px;
      font-size: 22px;
      font-weight: 700;
    }

    /* 문제2: 카테고리 버튼이 너무 작고 간격이 좁음 */
    .category-bar {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      overflow-x: auto;
      background: #f9f9f9;
    }
    .cat-btn {
      padding: 4px 8px;
      font-size: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      white-space: nowrap;
      cursor: pointer;
      color: #666;
    }
    .cat-btn.active { background: #FF3B30; color: #fff; border-color: #FF3B30; }

    /* 문제3: 메뉴 카드에 계층 구분이 없고 정보 배치가 혼잡 */
    .menu-list { padding: 8px 16px; padding-bottom: 70px; }
    .menu-card {
      border: 1px solid #eee;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .menu-card img {
      width: 100%;
      height: 80px;
      background: #ddd;
      object-fit: cover;
    }
    .menu-thumb {
      width: 100%;
      height: 80px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    /* 문제4: 가격과 이름의 시각적 위계가 없음 */
    .menu-card h3 { font-size: 13px; margin-top: 6px; color: #333; font-weight: 400; }
    .menu-card .price { font-size: 13px; color: #333; }
    .menu-card .desc { font-size: 10px; color: #aaa; margin-top: 2px; }
    /* 문제5: CTA 버튼이 눈에 띄지 않음 */
    .menu-card .order-btn {
      margin-top: 6px;
      padding: 4px 8px;
      font-size: 10px;
      background: #fff;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 2px;
      cursor: pointer;
    }

    /* 문제6: 장바구니 아이콘이 안 보임 */
    .cart-float {
      position: fixed;
      bottom: 60px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: #eee;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #aaa;
      cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; display: flex; justify-content: space-around;
      padding: 10px 0; border-top: 1px solid #eee;
      font-size: 11px; color: #999;
    }
    .nav-item { text-align: center; cursor: pointer; }
    .nav-item.active { color: #FF3B30; }
    .nav-item .nav-icon { font-size: 20px; margin-bottom: 2px; }

    .page { display: none; }
    .page.active { display: block; }

    .detail-header {
      background: #FF3B30; color: #fff; padding: 16px;
      display: flex; align-items: center; font-size: 17px; font-weight: 600;
    }
    .back-btn {
      background: none; border: none; color: #fff;
      font-size: 20px; margin-right: 12px; cursor: pointer;
    }
    .detail-body { padding: 16px; }
    .detail-body .big-thumb {
      width: 100%; height: 160px; background: #eee;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; border-radius: 4px;
    }
    .detail-body h2 { font-size: 16px; margin-top: 12px; }
    .detail-body .price-big { font-size: 16px; color: #333; margin-top: 4px; }
    .detail-body .desc-big { font-size: 13px; color: #888; margin-top: 8px; line-height: 1.5; }
    .detail-body .add-btn {
      margin-top: 16px; width: 100%; padding: 10px;
      background: #fff; color: #999; border: 1px solid #ddd;
      font-size: 14px; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>

  <!-- 메인 페이지 -->
  <div class="page active" id="page-main">
    <div class="header">맛있는 음식 주문</div>
    <div class="category-bar">
      <div class="cat-btn active">전체</div>
      <div class="cat-btn">한식</div>
      <div class="cat-btn">중식</div>
      <div class="cat-btn">일식</div>
      <div class="cat-btn">양식</div>
      <div class="cat-btn">분식</div>
      <div class="cat-btn">디저트</div>
      <div class="cat-btn">음료</div>
    </div>

    <div class="menu-list">
      <div class="menu-card" onclick="openItem('bibimbap')">
        <div class="menu-thumb">🍚</div>
        <h3>비빔밥</h3>
        <div class="price">8000원</div>
        <div class="desc">야채와 고추장이 어우러진 비빔밥</div>
        <button class="order-btn">담기</button>
      </div>
      <div class="menu-card" onclick="openItem('jjigae')">
        <div class="menu-thumb">🍲</div>
        <h3>김치찌개</h3>
        <div class="price">7000원</div>
        <div class="desc">깊은 맛의 김치찌개</div>
        <button class="order-btn">담기</button>
      </div>
      <div class="menu-card" onclick="openItem('tonkatsu')">
        <div class="menu-thumb">🍱</div>
        <h3>돈까스</h3>
        <div class="price">9000원</div>
        <div class="desc">바삭한 수제 돈까스</div>
        <button class="order-btn">담기</button>
      </div>
      <div class="menu-card" onclick="openItem('pasta')">
        <div class="menu-thumb">🍝</div>
        <h3>크림파스타</h3>
        <div class="price">11000원</div>
        <div class="desc">부드러운 크림소스 파스타</div>
        <button class="order-btn">담기</button>
      </div>
      <div class="menu-card" onclick="openItem('tteokbokki')">
        <div class="menu-thumb">🌶️</div>
        <h3>떡볶이</h3>
        <div class="price">5000원</div>
        <div class="desc">매콤달콤 국물 떡볶이</div>
        <button class="order-btn">담기</button>
      </div>
    </div>

    <div class="cart-float">🛒</div>
  </div>

  <!-- 상세 페이지 -->
  <div class="page" id="page-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="goBack()">‹</button>
      <span id="detail-title">메뉴 상세</span>
    </div>
    <div class="detail-body">
      <div class="big-thumb" id="detail-icon"></div>
      <h2 id="detail-name"></h2>
      <div class="price-big" id="detail-price"></div>
      <div class="desc-big" id="detail-desc"></div>
      <button class="add-btn">장바구니에 담기</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon">🏠</div>홈</div>
    <div class="nav-item"><div class="nav-icon">🔍</div>검색</div>
    <div class="nav-item"><div class="nav-icon">🛒</div>장바구니</div>
    <div class="nav-item"><div class="nav-icon">👤</div>마이</div>
  </div>

  <script>
    const items = {
      bibimbap: { icon: '🍚', name: '비빔밥', price: '8,000원', desc: '신선한 야채와 매콤한 고추장이 어우러진 전통 비빔밥입니다. 달걀 프라이와 참기름으로 고소한 맛을 더했습니다.' },
      jjigae: { icon: '🍲', name: '김치찌개', price: '7,000원', desc: '잘 익은 김치로 끓인 깊은 맛의 김치찌개입니다. 돼지고기와 두부가 들어 있습니다.' },
      tonkatsu: { icon: '🍱', name: '돈까스', price: '9,000원', desc: '두툼한 등심을 바삭하게 튀긴 수제 돈까스입니다. 특제 소스와 함께 제공됩니다.' },
      pasta: { icon: '🍝', name: '크림파스타', price: '11,000원', desc: '진한 크림소스에 베이컨과 버섯을 넣은 부드러운 파스타입니다.' },
      tteokbokki: { icon: '🌶️', name: '떡볶이', price: '5,000원', desc: '쫄깃한 떡과 어묵이 들어간 매콤달콤한 국물 떡볶이입니다.' }
    };

    function openItem(key) {
      const item = items[key];
      document.getElementById('detail-icon').textContent = item.icon;
      document.getElementById('detail-name').textContent = item.name;
      document.getElementById('detail-price').textContent = item.price;
      document.getElementById('detail-desc').textContent = item.desc;
      document.getElementById('detail-title').textContent = item.name;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-detail').classList.add('active');
    }

    function goBack() {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-main').classList.add('active');
    }
  </script>
</body>
</html>
